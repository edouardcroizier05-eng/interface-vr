<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>HUD Moto - Visière Augmentée</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

  <a-scene>
    <a-assets>
      <img id="road-view" src="https://cdn.pixabay.com/photo/2016/11/18/17/20/living-room-1835923_1280.jpg">
      </a-assets>

    <a-sky src="#road-view" rotation="0 -90 0"></a-sky>

    <a-entity camera look-controls position="0 1.6 0">
      
      <a-entity position="0 0 -0.6">
        
        <a-text value="116 KM/H" align="center" color="#ffffff" position="0 0.1 0" width="2.5" font="kelsonsans"></a-text>

        <a-text value="RADAR: 0" align="center" color="#ff477e" position="-0.4 -0.15 0" width="1.2"></a-text>

        <a-text value="GPS: OK" align="center" color="#3FE0CE" position="0.4 -0.15 0" width="1.2"></a-text>

        <a-plane width="1" height="0.002" color="#ffffff" opacity="0.5" position="0 -0.05 0"></a-plane>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
