<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>HUD Moto VR - Photoréaliste Prototype</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #banner {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(11, 19, 26, 0.8); color: #3FE0CE;
      padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999;
      text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

<div id="banner">HUD Connecté - Mode Conduite</div>

<a-scene fog="type: exponential; color: #a9d6f0; density: 0.025" renderer="antialias: true; colorManagement: true;">

  <a-assets>
    <a-mixin id="hud-bg" material="color: #6C757D; opacity: 0.6; transparent: true; shader: flat"></a-mixin>
    
    <img id="dangerGradL" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='700'><defs><radialGradient id='g' cx='0%25' cy='50%25' r='85%25'><stop offset='0%25' stop-color='%23FF0000' stop-opacity='0.8'/><stop offset='50%25' stop-color='%23FF0000' stop-opacity='0.3'/><stop offset='100%25' stop-color='%23FF0000' stop-opacity='0'/></radialGradient></defs><rect width='300' height='700' fill='url(%23g)'/></svg>">
    <img id="dangerGradR" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='700'><defs><radialGradient id='g' cx='100%25' cy='50%25' r='85%25'><stop offset='0%25' stop-color='%23FF0000' stop-opacity='0.8'/><stop offset='50%25' stop-color='%23FF0000' stop-opacity='0.3'/><stop offset='100%25' stop-color='%23FF0000' stop-opacity='0'/></radialGradient></defs><rect width='300' height='700' fill='url(%23g)'/></svg>">
    
    </a-assets>

  <a-sky color="#8FD3F4"></a-sky>
  <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.8" position="-1 2 1" castShadow="true"></a-light>

  <a-entity id="road-system">
    <a-plane rotation="-90 0 0" width="12" height="400" position="0 0 -190" material="color: #2b2b2b; roughness: 0.8"></a-plane>
    <a-entity id="lane-lines"></a-entity>
  </a-entity>

  <a-entity id="target-car" position="0 0 -20">
    <a-box width="1.9" height="1.2" depth="4.5" position="0 0.6 0" material="color: #C9CDD3; metalness: 0.8; roughness: 0.2"></a-box>
    <a-box id="brake-lights" width="1.8" height="0.1" depth="0.1" position="0 0.8 -2.25" material="color: #FF0000; emissive: #FF0000; emissiveIntensity: 0.2"></a-box>
  </a-entity>

  <a-camera position="0 1.6 0">
    
    <a-entity position="-0.7 -0.4 -1" rotation="0 5 0">
      <a-plane width="0.6" height="0.25" mixin="hud-bg" position="0 0 0" radius="0.05"></a-plane>
      
      <a-circle radius="0.08" position="-0.18 0 0.01" material="color: #ffffff; shader: flat"></a-circle>
      <a-circle radius="0.08" position="-0.18 0 0.005" material="color: #FF3B30; shader: flat" side="double" geometry="primitive:ring; radiusInner:0.065; radiusOuter:0.08"></a-circle>
      <a-text value="110" align="center" color="#FF3B30" width="1.8" position="-0.18 0 0.02" font="kelsonsans" fontImage=""></a-text>
      
      <a-text value="116" align="center" color="#FFA500" width="4.5" position="0.1 0 0.01" font="roboto"></a-text>
      <a-text value="km/h" align="center" color="#3FE0CE" width="1.2" position="0.28 -0.05 0.01"></a-text>
    </a-entity>

    <a-entity position="0 0.5 -1">
      <a-plane width="0.4" height="0.12" mixin="hud-bg" position="0 0 0"></a-plane>
      <a-text value="^ 2 km" align="center" color="#3FE0CE" width="1.5" position="0 0 0.01"></a-text>
    </a-entity>

    <a-entity position="0.7 -0.4 -1" rotation="0 -5 0">
      <a-circle radius="0.15" material="color: #111; opacity: 0.8; shader: flat"></a-circle>
      <a-text value="3 detectes" align="center" color="#3FE0CE" width="1.2" position="0 -0.18 0.01"></a-text>
      <a-circle radius="0.01" color="#FF3B30" position="0.05 0.05 0.01"></a-circle>
      <a-circle radius="0.01" color="#FFA500" position="-0.08 -0.02 0.01"></a-circle>
    </a-entity>

    <a-image id="danger-left" src="#dangerGradL" position="-1.2 0 -1" width="1" height="2.5" material="transparent: true; opacity: 0" depth-test="false"></a-image>
    <a-image id="danger-right" src="#dangerGradR" position="1.2 0 -1" width="1" height="2.5" material="transparent: true; opacity: 0" depth-test="false"></a-image>

  </a-camera>

</a-scene>

<script>
  // Animation de la route (Lignes pointillées)
  AFRAME.registerComponent('road-animator', {
    init: function () {
      this.lines = [];
      const container = document.querySelector('#lane-lines');
      for (let i = 0; i < 20; i++) {
        const line = document.createElement('a-plane');
        line.setAttribute('width', 0.2);
        line.setAttribute('height', 2);
        line.setAttribute('rotation', '-90 0 0');
        line.setAttribute('position', `0 0.01 ${-i * 10}`);
        line.setAttribute('material', 'color: #ffffff; shader: flat');
        container.appendChild(line);
        this.lines.push(line);
      }
    },
    tick: function (time, delta) {
      const speed = 25; // Sensation de grande vitesse (116 km/h)
      const dz = (speed * delta) / 1000;
      this.lines.forEach(line => {
        let z = parseFloat(line.getAttribute('position').z) + dz;
        if (z > 5) z -= 200;
        line.setAttribute('position', `0 0.01 ${z}`);
      });
    }
  });
  document.querySelector('a-scene').setAttribute('road-animator', '');

  // ==========================================
  // SYSTEME D'ALERTE DANGER (ANGLE MORT)
  // ==========================================
  const dangerLeft = document.querySelector('#danger-left');
  const dangerRight = document.querySelector('#danger-right');
  
  // Fonction pour déclencher un avertissement visuel
  function triggerBlindSpotWarning(side, duration = 3000) {
    const target = side === 'left' ? dangerLeft : dangerRight;
    
    // Animation d'apparition (Pulsation)
    target.setAttribute('animation__fadein', 'property: material.opacity; from: 0; to: 0.85; dur: 300; dir: alternate; loop: 4; easing: easeInOutSine');
    
    // Disparition après la durée
    setTimeout(() => {
      target.removeAttribute('animation__fadein');
      target.setAttribute('animation__fadeout', 'property: material.opacity; to: 0; dur: 500; easing: easeOutQuad');
    }, duration);
  }

  // Simulation d'une voiture qui te dépasse par la droite toutes les 8 secondes
  setInterval(() => {
    triggerBlindSpotWarning('right', 2500);
  }, 8000);

  // Simulation d'une voiture par la gauche toutes les 14 secondes
  setInterval(() => {
    triggerBlindSpotWarning('left', 2000);
  }, 14000);

</script>
</body>
</html>
