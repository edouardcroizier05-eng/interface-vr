<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>HUD Moto AR - Mode Pause</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

  <a-scene 
    background="transparent: true" 
    renderer="colorManagement: true; alpha: true"
    webxr="optionalFeatures: hit-test, local-floor, passthrough">

    <a-entity camera look-controls position="0 1.6 0">
      
      <a-entity position="0 0 -0.8">
        
        <a-plane width="1.4" height="0.6" 
                 material="color: #000; opacity: 0.25; shader: flat; transparent: true">
        </a-plane>
        
        <a-text value="116 KM/H" align="center" color="#ffffff" position="0 0.15 0.02" width="4"></a-text>

        <a-text value="RADAR: AUCUN" align="left" color="#ff477e" position="-0.5 -0.1 0.02" width="1.5"></a-text>

        <a-text value="GPS: TOUT DROIT" align="right" color="#3FE0CE" position="0.5 -0.1 0.02" width="1.5"></a-text>

        <a-plane width="1.2" height="0.005" color="#ffffff" opacity="0.4" position="0 -0.22 0.02"></a-plane>
      </a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
